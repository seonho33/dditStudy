<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style type="text/css">
div {
	width : 200px;
	height: 30px;
	margin: 30px;
	padding: 10px;
	border: 2px solid blue;
}

#d1{
	box-shadow: 20px 10px 5px skyblue;
}
#d2{
	box-shadow: 0px 0px 10px 10px pink;
}
#d3{
	box-shadow: 0px -5px 5px 5px red,
				0px 5px 5px 5px red;
}
#d4:hover{
	box-shadow: 0px 0px 10px 10px pink;
}

</style>


</head>
<body>

<div id="d1">d1</div>
<div id="d2">d2</div>
<br><br>

<div id="d3">d3</div>
<div id="d4">d4</div>


</body>
</html>
