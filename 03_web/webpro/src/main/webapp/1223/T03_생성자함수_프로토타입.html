<script type="text/javascript">

//생성자 객체함수 정의
function Rect(garo, sero){
	this.garo = garo;
	this.sero = sero;
};

 Rect.prototype = {
	constructor :Rect,
	area(){
		return (this.garo*this.sero);
	},
	circum(){
		return (this.garo+this.sero)*2;
	}
}; 

//정보출력함수 정의
const printRect = (obj, out) =>{
	console.log(obj);
	
 	let str =	`가로 : ${obj["garo"]}<br>
				세로 : ${obj["sero"]}<br>
				면적 : ${obj["area"]()}<br>
				둘레 : ${obj["circum"]()}`
	 
	  
/*	let str = "";
				
	//entries는 prototype의 메소드는 포함시키지 않는다.
 	ents = Object.entries(obj);
	console.log(ents);
	Object.entries(obj).forEach((item,idx) =>{
		str+= `${item[0]} : ${item[1]}<br>`
	})  */

	//entries는 prototype에 추가한 메소드가 나오지않아..
	document.querySelector(out).innerHTML = str;
};

//프로토타입에 메서드 추가(prototype) -> 여러개의 객체가 동시에 사용하게됨
