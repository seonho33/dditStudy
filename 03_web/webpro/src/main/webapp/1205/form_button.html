<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">
div{
	border: 1px dotted orange;
	margin: 10px;
	padding: 20px;
}
</style>

<script type="text/javascript">
	function proc_print(){
		
		//html요소 검색 id=id인 요소와 id=name인 요소를 검색하고 접근한다
		vid = document.querySelector("#id");
		vname = document.querySelector("#name");
		
		//검색요소에서 입력된 값을 가져온다...
		idValue = vid.value;
		nameValue = vname.value;
		
		//출력 - console.log() document.write(), alert()
		//html 요소 중 출력영역이 만들어져 있다면 출력영역을 검색해서 출력한다...
		console.log(idValue,nameValue);
		alert(idValue + " " + nameValue + "확인"); 
		/* document.write(idValue + " " + nameValue); */ 
		
		
		//출력내용
		str = "아이디 : " + idValue + "<br>";
		str += "이름 : " + nameValue + "<br>";
		
		//출력		
		document.querySelector("div").innerHTML =str;
		
	}
</script>
</head>
<body>

<pre>
	type 이 submit 인 제출버튼은 form 태그의 action 속성에 설정된
	Jsp 파일이 실행된다.
	
	type= "button" 인 확인버튼은 아무 기능도 없다.
	기능을 부여하기 위해서 이벤트핸들러가 필요하다
	
	이벤트 핸들러는 function 함수이름(){ }와 같은 형식으로 만든다.
	핸들러 함수내에서(javascript) html요소를 검색, 찾기, 접근 한다.
	
		
</pre>
<form action="form_button.jsp" method="post">

	아이디<input type="text" id="id" name="id"> <br>
	이름<input type="text" id="name" name="name"> <br>
	<br>
	<input type="submit">
	<input type="button" value="확인" onclick="proc_print()">
	
</form>

<hr color="red">
<!-- ==========출력영역========== -->
<div>

</div>

</body>
</html>
