const proc3 = async () =>{
	
	const res = await fetch("http://localhost/webpro/List_Fetch.do")
	
	const members = await res.json();
	
	let code = `<table border="1" class="table table-dark table-hover">
		<tr>
		<th>No.</th>
		<th>아이디</th>
		<th>비밀번호</th>
		<th>이름</th>
		<th>우편번호</th>
	</tr>`;
	
	members.forEach(({mem_id,mem_pass,mem_name,mem_zip},idx) =>{
		code += `<tr>
				<td>${idx+1}</td>
				<td>${mem_id}</td>
				<td>${mem_pass}</td>
				<td>${mem_name}</td>
				<td>${mem_zip}</td>
				`
	})
	code+=`</table>`
	
	document.querySelector("#result1").innerHTML=code;
	
}
