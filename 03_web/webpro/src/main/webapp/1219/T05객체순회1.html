<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="../css/public_css.css">
<script type="text/javascript">
const myCar = {
		make : "bmw" ,
		model : "x5" ,
		year : 2010,
		speed : 10,
		
		break : function(){
			this.speed = 0;
		},
		accel : function(){
			this.speed +=50;
		}
}

//객체정보를 출력하는 함수
const objPrint = (out) =>{
	
/* 	let str = `make : ${myCar.make}<br>
			   model : ${myCar.model}<br>
			   year : ${myCar["year"]}<br>
			   speed : ${myCar["speed"]}<br>`
 */
	//x변수는 myCar객체의 속성에 접근한다...
	let str = "";
	for(let x in myCar){
 		str += `myCar[${x}] : ${myCar[x]}<br>`;
 	}
 
	document.querySelector(out).innerHTML = str;
}

const proc1 = () =>{
	
	//객체정보를 출력하는 함수를 호출
	objPrint("#result1");
	
}

</script>
</head>
<body>

<div class="box">

	<h3></h3>

	<input type="button" value="확인" id="btn1" onclick="proc1()">

	<br><br>

		<div id="result1">
		</div>

</div>

</body>
</html>
