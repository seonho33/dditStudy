<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="../css/public_css.css">

<script type="text/javascript">
const original = [10,20,30,40,50]
document.addEventListener("DOMContentLoaded", () =>{

	let clickB = document.querySelector("#btn1");
	
	clickB.addEventListener('click', () => {
		let copy1 = [...original];
		
		copy1.splice(2,1,99);
		
		let str = `original : ${original}<br>
				   copy1 : ${copy1}<br>`;
				   
		document.querySelector("#result1").innerHTML= str;

	})
	
	let clickB2 = document.querySelector("#btn2");
	clickB2.addEventListener("click", () => {
		let index= 2;
		let newValue = 99;
		
		const copy2 = [...original.slice(0,index),newValue,...original.slice(index+1)]
		
		document.querySelector("#result2").innerHTML = copy2;
		
	})
})



</script>

</head>
<body>

<div class="box">

	<h3>
	const original = [10,20,30,40,50];<br>
	let copy1 = [...original];<br>
	
	copy1.splice(2,1,99);
	</h3>

	<input type="button" value="확인" id="btn1">

	<br><br>

		<div id="result1">
		</div>

</div>


<div class="box">

	<h3>
		let index= 2; <br>
		let newValue = 99;<br>
		const copy2 = [...original.slice(0,index),newValue,...original.slice(index+1)]<br>
	
	</h3>

	<input type="button" value="확인" id="btn2">

	<br><br>

		<div id="result2">
		</div>

</div>

</body>
</html>
