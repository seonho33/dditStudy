<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test_Radius</title>
<style>
img{
	width: 100px;
	height : 100px;
	border : 2px solid green;
}
.i2{
	border-radius: 50%;
}
#ima{
	border-radius: 30px 50px;
}
#imb{
	border-radius: 30px;
}
#imc{

}
#imd{
	border-radius: 20px 30px 40px 50px;
}

</style>
</head>
<body>


<img alt="main01.jpg" src="../images/main01.jpg">
<img alt="Tulips.jpg" src="../images/Tulips.jpg">

<hr color = red>

<img class="i2" alt="main01.jpg" src="../images/main01.jpg">
<img class="i2" alt="Tulips.jpg" src="../images/Tulips.jpg">
<img class="i2" alt="studycom.jpg" src="../images/studycom.jpg">
<img class="i2" alt="딸기스무디.jpg" src="../images/딸기스무디.jpg">

<hr color = red>

<img id="ima" alt="main01.jpg" src="../images/main01.jpg">
<img id="imb" alt="Tulips.jpg" src="../images/Tulips.jpg"><br>

</html>
