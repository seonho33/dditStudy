<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="../css/public_css.css">

<script type="text/javascript">
//난수발생
rnd = Math.floor(Math.random()*100+1); //1~100까지의 숫자

const proc1 = () =>{
	//id=su인 요소를 검색하여 입력한 수를 가져온다 - String 으로 리턴됨
	suValue = Number(document.querySelector("#su").value.trim());
	
	if(rnd == suValue){
		hint = "정답입니다."
	}else if(rnd>suValue){
		hint = "더 큰수를 입력하세요";
	}else{
		hint = "더 작은수를 입력하세요";
	}
	
	document.querySelector("#result1").innerHTML=hint;
}

const proc2=()=>{
	const arr = ["가위","바위","보"];
	//arr[0],arr[1],arr[2]
	rnd = Math.floor(Math.random()*arr.length);//0~2까지 숫자 랜덤
	
	com = arr[rnd];
	user = prompt("가위바위보 입력")
	
	str = `사용자 : ${user}<br>
		   컴퓨터 : ${com}<br>`;
		   
		   
	
	if(user == com){
		str += "비겼습니다"
	}else if(user =="가위"&&com=="보"
			||user=="바위"&&com=="가위"
			||user=="보"&&com=="바위"){
		str += "이겼습니다"
	}else {
		str += "졌습니다."
	}
	document.querySelector("#result2").innerHTML = str;
}

const proc3 = () =>{
	let arr=[];
	let str = "";
	while(arr.length<6){
	rnd = Math.floor(Math.random()*45+1);
	if(!(arr.includes(rnd))){
		arr.push(rnd);
	}}
	for(i=0;i<arr.length;i++){
		str += arr[i]+" "
	}
	document.querySelector("#result3").innerHTML=str;
}
</script>

</head>
<body>

<div class="box">

	<h3>1~100사이의 난수를 발생<br>
		입력하여 난수를 맞추는 프로그램<br>
		힌트를 작성해서 출력<br>
	</h3>
	<input type="text" id="su">
	<input type="button" value="확인" id="btn1" onclick="proc1()">

	<br><br>

	<div id="result1">
	</div>

</div>

<div class="box">

	<h3>
	1. 가위 바위 보 게임을 할 수 있는 프로그램을 작성.<br>
(컴퓨터는 랜덤, 사용자는 prompt로 입력 받아서 처리)<br>
	</h3>
	<input type="text" id="su">
	<input type="button" value="확인" id="btn2" onclick="proc2()">

	<br><br>

	<div id="result2">
	</div>

</div>
<div class="box">
	
	<h3>
	로또 번호를 생성하는 프로그램을 작성.<br>
	(1번 ~ 45번 중 6개의 번호를 추첨)<br>
	</h3>
	
	<input type="text" id="su">
	
	<input type="button" value="확인" id="btn3" onclick="proc3()">

	<br><br>

	<div id="result3">
	</div>

</div>

</body>
</html>
