<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
div{
   width : 50px;
   height : 50px;
}
.btn {
  padding: 10px 20px;
  background: #3498db;
  color: white;
  transition: background 0.3s ease, transform 0.2s ease;
}
.btn:hover {
  background: #2c3e50;
  transform: scale(1.05);/* 확대 */
  
  
  /*transform: 요소를 회전, 이동, 크기 조절 등으로 변형함

    transition: 변형을 부드럽게 만들어 줌  */
}
</style>
</head>
<body>
<div class="btn"></div>
</body>
</html>
