<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style type="text/css">

*{
	box-sizing: border-box;
}
ul{
	border : 10px inset red;
	list-style: none;
	width: 80%;
	margin: 10px auto;
	display:flex;
	flex-wrap: wrap;
	border-left: none;
	border-right: none;
	justify-content: space-around;
}
ul li{
	margin: 5px;
	text-align: center;
	flex-basis: 220px; /* whidth: 220px; flex-basis : auto;  */
}
ul li a{
	font-size: 1.5rem;
	text-decoration: none;
	text-transform: uppercase;
	letter-spacing: 10px;
}
ul li a:visited {
	color: blue;
}

</style>

</head>

<body>

<ul>
	<li><a href="#">home</a></li>
	<li><a href="#">project</a></li>
	<li><a href="#">notice</a></li>
	<li><a href="#">qna</a></li>
</ul>



</body>
</html>
