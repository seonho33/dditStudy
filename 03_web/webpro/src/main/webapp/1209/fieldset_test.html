<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>

<style type="text/css">

label {
	display: inline-block;
	width: 80px;
	height: 30px;
}

fieldset {
	width: 500px;
	margin: 20px auto;
}

div {
	margin: 20px auto;
	width: 500px;
	border: 2px solid black;
	padding: 10px;
	text-align: center;
}

.gender{
	width: 40px;
}

</style>

</head>
<body>

<form action="fieldest_test.jsp">

<fieldset>
	
	<legend>이적사항입력</legend>

	<label for="id">아이디</label>
<!-- 	<input type="text" name="id" id="id"><br> -->
	<input type="text" name="id" id="id" placeholder="아이디입력" autofocus="autofocus" value="a001" title="홍길동"> <br>
	<label for="name">이름</label> 
	<input type="text" name="name" id="name"><br>
	<label for="tel">전화번호</label>
	<input type="tel" pattern="010-[0-9]{4}-[0-9]{4}" name="tel" id="tel" value="010-1111-2222" > <br>
	<label class="gender" for="male">남자</label>	
	<input type="radio" name="gender" value="남자" id="male">
	&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
	<label class="gender" for="female">여자</label>
	<input type="radio" name="gender" value="여자" id="female">
</fieldset>

	<div>

	<button>전송</button>
	<input type="submit">
	<button type="submit">전송</button>
	<input type="image" src="../images/check.png" alt="check.png">

	</div>
	
	
		
</form>

</body>
</html>
