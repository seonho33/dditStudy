<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>test_img</title>

<style>
img{
	width : 200px;
	height : 150px;
}
</style>

</head>
<body>
<pre>
<!-- 이미지 표현하기 img 태그를 활용해서... -->
<!-- 속성(attribute)사용 src="실제 이미지의 경로" alt="대체문자" -->
<!-- alt (대체문자, 이미지의 경로나 이름의 오류로 표현되지 않을때 대신 출력될 문자) -->
<!-- 이미지 크기는 css로 style에서 설정, 설정시 태그이름을 이용함... width(가로길이), height(세로길이) -->
<img src="../images/국화1.jpg" alt="국화3이미지">     <img src="../images/뱅쇼.jpg" alt="">


<img src="../images/호랑이.jpg" alt="">     <img src="../images/펭귄.jpg" alt="">
</pre>
</body>
</html>
