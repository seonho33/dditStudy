<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>텍스트스타일</title>

<style>
span1{
	color : red;
	background-color: olive;
	font-weight : bold;
	font-style: italic;
}
span{
	color : yellow;
	background-color: black;
}

	pre{

		border-top-width : 15px;
		border-top-style : solid;
		border-top-color : pink;

		border-right-width : 10px;
		border-right-style : dotted;
		border-right-color : green;
				
		border-bottom-width : 15px;
		border-bottom-style : dashed;
		border-bottom-color : red;

		border-left-width : 20px;
		border-left-style : double;
		border-left-color : blue;

	}
	h2{
		border : 5px solid pink
	}
</style>

</head>

<body>
<!-- span 태그 : 화면에 직접적인 변화를 보이지않는다... 스타일을 적용해서 변화를 준다 -->
<h2>진달래꽃</h2>
<pre>

김소월
나 보기가 역겨워
가실 때에는
<span>말없이 고이 보내 드리우리다</span>

영변에 약산
진달래꽃
아름 따다 가실 <span1>길에 뿌리우리다</span1>

가시는 걸음걸음
놓인 그 꽃을
사뿐히 즈려밟고 가시옵소서

나 보기가 역겨워
가실 때에는
죽어도 아니 눈물 흘리우리다
</pre>

</body>
</html>
