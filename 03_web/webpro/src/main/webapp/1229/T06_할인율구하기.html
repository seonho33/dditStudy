ptag2 = null;

//addEventListener에서 참조된 함수
//함수내에서 removeEventListener('click',현재함수이름)
//현재 
function fn_listener(){
	//this 가 사용 가능하다..()=>{}로 표현하면 this가 window기 때문에
	//							 this를 사용할수없다
	console.log(this);
	
	//이미 만들어져있는 다른 p태그를 삭제
	if(ptag2 != null) ptag2.remove();
	
	//랜덤 발생
	rnd2 = Math.floor(Math.random()*6+5);
	
	//p태그 생성
	ptag2 = document.createElement("p");
	
	//textNode 생성
	textNo2 = document.createTextNode(`${rnd2}% 할인!`);
	
	//p태그에 textNode를 추가한다..
	ptag2.appendChild(textNo2);
	
	//클릭한 이미지의 부모요소 찾기
	vdiv2 = this.closest('div');
	
	//p태그를 부모 div에 추가
	vdiv2.appendChild(ptag2);
	
	this.removeEventListener('click',fn_listener)
}//fn_listener

ptag = null;

const proc1 = (target) =>{
	//target : 클릭한 이미지 객체
	
	//이미 만들어져있는 다른 p태그를 삭제
	if(ptag != null) ptag.remove();
	
	//랜덤 발생
	rnd = Math.floor(Math.random()*6+5);
	
	//p태그 생성
	ptag = document.createElement("p");
	
	//textNode 생성
