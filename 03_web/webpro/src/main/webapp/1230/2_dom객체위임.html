<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet"  href="../css/public_css.css">

<style>

img{
  width : 60px;
  height : 60px;
  border-radius: 50%;
}
</style>

<script>
//각 li요소에 이벤트 핸들러를 작성하는게 아니고 부모 요소에 이벤트핸들러를 작성하라

window.onload = () =>{

	let va = document.querySelector("#ua");
	
	va.addEventListener('click', function(ev){
		//this = 클릭한 va - #ua
		if(ev.target.tagName == "LI"){
			console.log(this);
			vData=ev.target.textContent;
			
			//이미지 생성
			
			vimg = document.createElement("img");
			vimg.src = `../images/${vData}`;
			vimg.alt = vData;
			
			event.target.appendChild(vimg);
			console.log(event.target)
		}
	})
	
}

 
</script>

</head>
<body>


<div class="box">
	<h3>
	 li요소를 각각 클릭하면  해당하는 이미지를 추가한다 <br>
	 각 li 요소에 onclick대신에 <br> 부모요소 ul#ua 에 이벤트를 위임 한다 
	</h3>
	<ul id="ua">
		<li>coffee1.jpg</li>
		<li>flower-1.jpg</li>
		<li>Penguins.jpg</li>
		<li>studycom.jpg</li>
		<li>UML.jpg</li>
	</ul>
</div>

</body>
</html>
